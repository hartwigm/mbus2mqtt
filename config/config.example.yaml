# mbus2mqtt configuration
# Copy to /etc/mbus2mqtt/config.yaml and adjust

property: "m47"

mqtt:
  broker: "mqtt://localhost:1883"
  username: "mbus2mqtt"
  password: "changeme"
  client_id: "mbus2mqtt-m47"

# Default read interval in minutes (can be overridden per device)
read_interval_minutes: 15

# Serial ports with M-Bus adapters
ports:
  - path: "/dev/serial/by-id/usb-FTDI_FT232R_USB_UART_AQ03MP6X-if00-port0"
    alias: "usb0"
    baud_rate: 2400
  - path: "/dev/serial/by-id/usb-Prolific_Technology_Inc._USB-Serial_Controller_DTEAt114J20-if00-port0"
    alias: "usb1"
    baud_rate: 9600

# M-Bus devices
# medium: water | warm_water | heat | gas | electricity
# value_factor: multiply raw value (e.g. 0.001 to convert liters → m³)
devices:
  # USB0 - Wasserzähler (raw value in liters, factor converts to m³)
  - secondary_address: "20135442523B0307"
    port: "usb0"
    name: "WZ 20135442"
    medium: "water"
    value_factor: 0.001
  - secondary_address: "20136194523B0307"
    port: "usb0"
    name: "WZ 20136194"
    medium: "water"
  - secondary_address: "20136663523B0307"
    port: "usb0"
    name: "WZ 20136663"
    medium: "water"
  - secondary_address: "20136891523B0307"
    port: "usb0"
    name: "WZ 20136891"
    medium: "water"
  - secondary_address: "24104173523B0307"
    port: "usb0"
    name: "WZ 24104173"
    medium: "water"
  - secondary_address: "24104290523B0307"
    port: "usb0"
    name: "WZ 24104290"
    medium: "water"
  - secondary_address: "24104692523B0307"
    port: "usb0"
    name: "WZ 24104692"
    medium: "water"
  - secondary_address: "24104851523B0307"
    port: "usb0"
    name: "WZ 24104851"
    medium: "water"

  # USB1 - Wärmezähler (read_interval_minutes overrides global default)
  - secondary_address: "21000094523B0504"
    port: "usb1"
    name: "Wärmemengenzähler"
    medium: "heat"
    read_interval_minutes: 5

logging:
  level: "info"
  file: "/var/log/mbus2mqtt.log"

state_file: "/var/lib/mbus2mqtt/state.json"
