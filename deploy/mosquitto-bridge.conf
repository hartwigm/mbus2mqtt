# Mosquitto bridge configuration snippet
# Add to /etc/mosquitto/conf.d/house-ai-bridge.conf
#
# Forwards house-ai/# topics to the central house.ai broker

connection house-ai-bridge
address house-ai-broker.example.com:8883
topic property/# out 1
bridge_cafile /etc/mosquitto/certs/ca.crt
remote_username bridge-user
remote_password bridge-password
bridge_protocol_version mqttv311
notifications false
start_type automatic
